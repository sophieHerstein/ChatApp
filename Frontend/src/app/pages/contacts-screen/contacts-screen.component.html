<div class="background">
  <app-header [showContacts]="false"></app-header>
  <div class="container">
    <h1>Kontakte</h1>
    <button class="btn btn-secondary mb-3" (click)="addContact()">
      <ng-icon name="bootstrapPlusCircle"></ng-icon>
      Kontakt hinzufügen
    </button>
    @for (contact of contacts; track contact.id) {
      <div
        class="contact card p-3 mb-3"
        [ngClass]="{ unread: contact.messageUnread }"
        [routerLink]="['/' + EAppPaths.Chat, contact.id]"
      >
        <div class="d-flex gap-4 align-items-center">
          <img ngSrc="{{ contact.image }}" alt="Avatar" width="50" height="50" />
          <span class="contact-name">{{ contact.name }}</span>
        </div>
        <div class="d-flex gap-4 align-items-center mt-2 justify-content-between">
          <span class="text-secondary contact-last-message">{{ contact.lastMessage }}</span>
          <span class="text-secondary contact-last-message-time">{{
            contact.lastMessageTime
          }}</span>
        </div>
      </div>
    }
  </div>
</div>
