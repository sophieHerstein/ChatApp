<div class="background d-flex flex-column align-items-center justify-content-center">
  <div class="card">
    <h1>Login</h1>
    <div class="d-flex flex-column mt-3 mb-2">
      <label for="nutzername">Nutzername</label>
      <input id="nutzername" type="text" [formControl]="usernameFC" autocomplete="username" />
    </div>
    <div class="d-flex flex-column mb-4">
      <label for="passwort">Passwort</label>
      <div class="password-wrapper">
        <input
          class="form-control"
          [formControl]="passwordFC"
          [type]="showPassword ? 'text' : 'password'"
          id="passwort"
          autocomplete="current-password"
          [attr.aria-invalid]="errorOccured()"
          aria-describedby="login-error"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="showPassword = !showPassword"
          [attr.aria-label]="showPassword ? 'Passwort ausblenden' : 'Passwort anzeigen'"
          [attr.aria-pressed]="showPassword"
        >
          <ng-icon
            [name]="showPassword ? 'bootstrapEyeSlash' : 'bootstrapEye'"
            aria-hidden="true"
          ></ng-icon>
        </button>
      </div>
      @if (errorOccured()) {
        <span id="login-error" class="text-danger" role="alert">
          Login war nicht erfolgreich. Versuche es nochmal.
        </span>
      }
    </div>
    <button
      [disabled]="usernameFC.invalid || passwordFC.invalid"
      class="btn btn-primary mb-2"
      (click)="login()"
    >
      Anmelden
    </button>
    <span>Noch kein Account? <a [routerLink]="'/' + EAppPaths.Register">Registrieren</a></span>
  </div>
</div>
