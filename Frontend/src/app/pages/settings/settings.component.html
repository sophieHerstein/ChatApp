<div class="background">
  <div class="container">
    <h1>Einstellungen</h1>
    <div class="d-flex flex-column mb-3">
      <span>Profilbild ändern</span>
      @if (profileImagePreview()) {
        <img [src]="profileImagePreview()" alt="Profilbild" class="profile-image mb-2" />
      }
      <input
        #fileInput
        type="file"
        accept="image/*"
        hidden
        (change)="onProfileImageSelected($event)"
      />
      <button type="button" class="btn btn-secondary mt-2" (click)="fileInput.click()">
        Profilbild auswählen
      </button>
    </div>
    <div class="d-flex flex-column mt-3 mb-2">
      <label for="nutzername">Nutzername ändern</label>
      <input id="nutzername" type="text" [(ngModel)]="username" />
    </div>
    <div class="d-flex flex-row justify-content-between gap-3">
      <div class="d-flex flex-column mb-3 w-75">
        <label for="passwort">Passwort</label>
        <input id="passwort" type="password" [(ngModel)]="confirmPassword" />
      </div>
      <div class="d-flex flex-column mb-3 w-75">
        <label for="passwortWiederholen">Passwort wiederholen</label>
        <input id="passwortWiederholen" type="password" [(ngModel)]="password" />
      </div>
    </div>
    <button class="btn btn-primary mb-2" (click)="save()">Speichern</button>
  </div>
</div>
